{% extends "base.html" %}
{% block title %}Cadastro de Viatura{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="fw-bold text-primary">🚐 Cadastro de Viatura</h2>

  <form method="POST" action="/cadastro/viatura" class="row g-3">
    <div class="col-md-6">
      <label for="matricula" class="form-label">Matrícula</label>
      <input type="text" id="matricula" name="matricula" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label for="modelo" class="form-label">Modelo</label>
      <input type="text" id="modelo" name="modelo" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label for="capacidade" class="form-label">Capacidade</label>
      <input type="number" id="capacidade" name="capacidade" class="form-control" required>
    </div>

    <div class="col-md-6">
      <label for="status" class="form-label">Status</label>
      <select id="status" name="status" class="form-select">
        <option value="Ativa">Ativa</option>
        <option value="Inativa">Inativa</option>
      </select>
    </div>

    <div class="col-12">
      <button type="submit" class="btn btn-success">Cadastrar Viatura</button>
    </div>
  </form>
</div>
{% endblock %}
