{% extends "base.html" %}
{% block title %}Usuários{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="fw-bold text-primary mb-4">👥 Gestão de Usuários</h2>

  <table class="table table-striped table-hover">
    <thead class="table-primary">
      <tr>
        <th>ID</th>
        <th>Usuário</th>
        <th>Perfil</th>
        <th>Ações</th>
      </tr>
    </thead>
    <tbody>
      {% for u in usuarios %}
      <tr>
        <td>{{ u.id }}</td>
        <td>{{ u.usuario }}</td>
        <td>{{ u.perfil }}</td>
        <td>
          <a href="{{ url_for('resetar_senha', usuario=u.usuario) }}" class="btn btn-sm btn-warning">Resetar Senha</a>
          <a href="{{ url_for('remover_usuario', usuario=u.usuario) }}" class="btn btn-sm btn-danger">Remover</a>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
