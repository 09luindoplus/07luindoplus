{% extends "base.html" %}
{% block title %}Resetar Senha{% endblock %}

{% block content %}
<div class="container mt-4">
  <h2 class="text-warning">🔑 Resetar Senha de {{ usuario }}</h2>

  {% if erro %}
    <div class="alert alert-danger">{{ erro }}</div>
  {% endif %}
  {% if sucesso %}
    <div class="alert alert-success">{{ sucesso }}</div>
  {% endif %}

  <form method="POST">
    <div class="mb-3">
      <label for="senha" class="form-label">Nova Senha</label>
      <input type="password" name="senha" id="senha" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-warning">Redefinir</button>
    <a href="{{ url_for('listar_usuarios') }}" class="btn btn-secondary">Cancelar</a>
  </form>
</div>
{% endblock %}
